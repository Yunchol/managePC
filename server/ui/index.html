<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>学童 PC 管理</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f0f4f8; min-height: 100vh; }

    /* ヘッダー */
    .header {
      background: #2d6a4f;
      color: white;
      padding: 14px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header h1 { font-size: 1.1rem; }
    .qr-btn {
      background: white;
      color: #2d6a4f;
      border: none;
      padding: 8px 14px;
      border-radius: 8px;
      font-weight: bold;
      font-size: 0.95rem;
      cursor: pointer;
    }

    /* PC カードリスト */
    .pc-list { padding: 12px; display: flex; flex-direction: column; gap: 12px; }

    .empty {
      text-align: center;
      padding: 60px 20px;
      color: #aaa;
      font-size: 1rem;
    }

    /* PC カード */
    .pc-card {
      background: white;
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .pc-card.offline { opacity: 0.6; }

    .pc-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    .dot {
      width: 12px; height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot.online  { background: #52b788; }
    .dot.offline { background: #adb5bd; }

    .pc-name { font-size: 1.1rem; font-weight: bold; flex: 1; }

    .badge {
      font-size: 0.75rem;
      padding: 3px 10px;
      border-radius: 20px;
      font-weight: bold;
    }
    .badge-block   { background: #ffd6d6; color: #c0392b; }
    .badge-paused  { background: #fff3cd; color: #856404; }

    /* タイマー表示 */
    .timer-display {
      text-align: center;
      font-size: 2.4rem;
      font-weight: bold;
      color: #2d6a4f;
      letter-spacing: 2px;
      margin: 6px 0 12px;
    }
    .timer-display.warning { color: #e63946; }

    .paused-info {
      text-align: center;
      font-size: 0.9rem;
      color: #856404;
      background: #fff3cd;
      padding: 6px 12px;
      border-radius: 8px;
      margin-bottom: 10px;
    }

    /* ボタン */
    .btn-row { display: flex; gap: 8px; margin-top: 8px; }
    .btn {
      flex: 1;
      padding: 13px 6px;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: opacity 0.1s;
    }
    .btn:active { opacity: 0.7; }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; }

    .btn-green  { background: #52b788; color: white; }
    .btn-orange { background: #f4a261; color: white; }
    .btn-blue   { background: #4a90d9; color: white; }
    .btn-red    { background: #e63946; color: white; }
    .btn-gray   { background: #adb5bd; color: white; }

    /* QR モーダル */
    .modal-bg {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.65);
      justify-content: center;
      align-items: center;
      z-index: 100;
    }
    .modal-bg.show { display: flex; }
    .modal-box {
      background: white;
      padding: 28px 24px;
      border-radius: 18px;
      text-align: center;
      max-width: 300px;
      width: 90%;
    }
    .modal-box h2 { font-size: 1.1rem; margin-bottom: 12px; }
    .modal-box img { width: 200px; height: 200px; border: 1px solid #eee; border-radius: 8px; }
    .modal-url {
      margin: 10px 0;
      font-size: 0.8rem;
      color: #555;
      word-break: break-all;
    }
    .modal-close {
      margin-top: 12px;
      width: 100%;
      padding: 12px;
      background: #2d6a4f;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="header">
  <h1>学童 PC 管理</h1>
  <button class="qr-btn" onclick="openQR()">QR コード</button>
</div>

<div class="pc-list" id="pcList">
  <div class="empty">接続中の PC を待っています…</div>
</div>

<!-- QR モーダル -->
<div class="modal-bg" id="qrModal" onclick="closeQR()">
  <div class="modal-box" onclick="event.stopPropagation()">
    <h2>このページを共有</h2>
    <img id="qrImg" src="/qr" alt="QR コード">
    <div class="modal-url" id="qrUrl"></div>
    <button class="modal-close" onclick="closeQR()">閉じる</button>
  </div>
</div>

<script>
  // 秒数を mm:ss 形式に変換
  function fmt(sec) {
    if (sec <= 0) return '00:00';
    const m = Math.floor(sec / 60);
    const s = sec % 60;
    return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  }

  // API を叩いて画面を更新
  async function refresh() {
    try {
      const res = await fetch('/api/status');
      const pcs = await res.json();
      render(pcs || []);
    } catch(e) { /* サーバー未起動時は無視 */ }
  }

  function render(pcs) {
    const list = document.getElementById('pcList');
    if (!pcs.length) {
      list.innerHTML = '<div class="empty">接続中の PC を待っています…</div>';
      return;
    }

    pcs.sort((a, b) => a.name.localeCompare(b.name));

    list.innerHTML = pcs.map(pc => {
      const onlineCls  = pc.connected ? 'online' : 'offline';
      const cardCls    = pc.connected ? '' : 'offline';

      // バッジ
      const blockBadge  = pc.blocked ? '<span class="badge badge-block">ブロック中</span>' : '';
      const pauseBadge  = pc.paused  ? '<span class="badge badge-paused">一時停止中</span>' : '';

      // タイマー表示
      let timerHTML = '';
      if (pc.remaining > 0) {
        const warn = pc.remaining <= 60 ? 'warning' : '';
        timerHTML = `<div class="timer-display ${warn}">${fmt(pc.remaining)}</div>`;
      } else if (pc.paused && pc.pausedAt > 0) {
        timerHTML = `<div class="paused-info">一時停止中 ― 残り ${fmt(pc.pausedAt)}</div>`;
      }

      // タイマー開始ボタン（接続中のみ）
      const timerBtns = pc.connected ? `
        <div class="btn-row">
          <button class="btn btn-green" onclick="startTimer('${pc.name}',15)">15分</button>
          <button class="btn btn-green" onclick="startTimer('${pc.name}',30)">30分</button>
          <button class="btn btn-green" onclick="startTimer('${pc.name}',60)">60分</button>
        </div>` : '';

      // 一時停止 / 再開ボタン
      let pauseBtn = '';
      if (pc.connected && pc.remaining > 0) {
        pauseBtn = `<button class="btn btn-orange" onclick="pauseTimer('${pc.name}')">一時停止</button>`;
      } else if (pc.connected && pc.paused) {
        pauseBtn = `<button class="btn btn-blue" onclick="resumeTimer('${pc.name}')">再開</button>`;
      }

      // ブロック / 解除ボタン
      const blockBtn = pc.connected
        ? (pc.blocked
            ? `<button class="btn btn-gray"  onclick="unblockPC('${pc.name}')">ブロック解除</button>`
            : `<button class="btn btn-red"   onclick="blockPC('${pc.name}')">ブロック</button>`)
        : '';

      const actionRow = (pauseBtn || blockBtn)
        ? `<div class="btn-row">${pauseBtn}${blockBtn}</div>`
        : '';

      return `
        <div class="pc-card ${cardCls}">
          <div class="pc-header">
            <div class="dot ${onlineCls}"></div>
            <span class="pc-name">${pc.name}</span>
            ${blockBadge}${pauseBadge}
          </div>
          ${timerHTML}
          ${timerBtns}
          ${actionRow}
        </div>`;
    }).join('');
  }

  // 各操作
  async function api(url, body) {
    await fetch(url, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(body)
    });
    refresh();
  }

  function startTimer(pc, min) { api('/api/timer/start', {pc, minutes: min}); }
  function pauseTimer(pc)      { api('/api/timer/pause',  {pc}); }
  function resumeTimer(pc)     { api('/api/timer/resume', {pc}); }
  function blockPC(pc)         { api('/api/block/start',  {pc}); }
  function unblockPC(pc)       { api('/api/block/stop',   {pc}); }

  // QR コード
  function openQR() {
    document.getElementById('qrUrl').textContent = window.location.href;
    document.getElementById('qrModal').classList.add('show');
  }
  function closeQR() {
    document.getElementById('qrModal').classList.remove('show');
  }

  // 1 秒ごとに更新
  refresh();
  setInterval(refresh, 1000);
</script>
</body>
</html>
