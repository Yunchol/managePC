<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>学童 PC 管理</title>
  <style>
    :root {
      --primary:   #6366f1;
      --primary-d: #4f46e5;
      --success:   #10b981;
      --warning:   #f59e0b;
      --danger:    #ef4444;
      --gray:      #64748b;
      --bg:        #f1f5f9;
      --card:      #ffffff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      min-height: 100vh;
    }

    /* ── ヘッダー ── */
    .header {
      background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 50;
      box-shadow: 0 2px 20px rgba(0,0,0,0.35);
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .header-icon {
      width: 40px; height: 40px;
      background: rgba(255,255,255,0.12);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem;
    }
    .header-text h1 {
      font-size: 1.1rem;
      font-weight: 800;
      color: white;
      letter-spacing: 0.02em;
    }
    .header-text p {
      font-size: 0.72rem;
      color: #94a3b8;
      margin-top: 1px;
    }
    .qr-btn {
      background: rgba(255,255,255,0.1);
      color: white;
      border: 1px solid rgba(255,255,255,0.2);
      padding: 8px 16px;
      border-radius: 10px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background 0.15s;
    }
    .qr-btn:hover { background: rgba(255,255,255,0.2); }

    /* ── グリッド ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      padding: 20px;
      max-width: 1100px;
      margin: 0 auto;
    }
    @media (max-width: 860px) { .grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 560px) { .grid { grid-template-columns: 1fr; padding: 12px; gap: 12px; } }

    /* ── PC カード ── */
    .card {
      background: var(--card);
      border-radius: 20px;
      padding: 18px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.07);
      position: relative;
      overflow: hidden;
      transition: box-shadow 0.2s;
    }
    .card:hover { box-shadow: 0 6px 24px rgba(0,0,0,0.11); }

    /* 上部アクセントライン */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: #e2e8f0;
      transition: background 0.4s;
    }
    .card.running::before { background: linear-gradient(90deg, var(--success), #34d399); }
    .card.paused::before  { background: linear-gradient(90deg, var(--warning), #fbbf24); }
    .card.blocked::before { background: linear-gradient(90deg, var(--danger),  #f87171); }
    .card.offline         { opacity: 0.55; }

    /* カードヘッダー */
    .card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .pc-info { display: flex; align-items: center; gap: 8px; }
    .dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot.on  { background: var(--success); box-shadow: 0 0 0 3px rgba(16,185,129,0.18); }
    .dot.off { background: #cbd5e1; }
    .pc-name { font-size: 1rem; font-weight: 800; color: #1e293b; }

    .tag {
      font-size: 0.65rem;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 20px;
    }
    .tag-blocked { background: #fee2e2; color: #dc2626; }
    .tag-paused  { background: #fef9c3; color: #a16207; }

    /* タイマー */
    .timer-area {
      text-align: center;
      min-height: 72px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin: 6px 0 14px;
    }
    .timer-num {
      font-size: 3rem;
      font-weight: 900;
      letter-spacing: 3px;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      transition: color 0.4s;
    }
    .timer-num.green { color: var(--success); }
    .timer-num.red   { color: var(--danger);  animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }
    .timer-sub {
      font-size: 0.68rem;
      color: #94a3b8;
      letter-spacing: 0.08em;
      margin-top: 4px;
      text-transform: uppercase;
    }
    .paused-pill {
      background: #fef9c3;
      border: 1px solid #fde047;
      color: #854d0e;
      padding: 7px 14px;
      border-radius: 30px;
      font-size: 0.8rem;
      font-weight: 700;
    }
    .idle-text { color: #cbd5e1; font-size: 0.9rem; }

    /* プリセットボタン */
    .presets {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      margin-bottom: 8px;
    }
    .btn-pre {
      padding: 9px 4px;
      border: 1.5px solid #bbf7d0;
      border-radius: 10px;
      background: #f0fdf4;
      color: #065f46;
      font-size: 0.82rem;
      font-weight: 800;
      cursor: pointer;
      transition: background 0.1s, transform 0.08s;
    }
    .btn-pre:hover  { background: #dcfce7; }
    .btn-pre:active { transform: scale(0.95); }

    /* カスタム入力 */
    .custom-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 10px;
    }
    .custom-row input {
      width: 0; flex: 1;
      padding: 9px 8px;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      color: #1e293b;
      text-align: center;
      outline: none;
      transition: border-color 0.15s;
      min-width: 0;
    }
    .custom-row input:focus { border-color: var(--primary); }
    .custom-row .unit {
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--gray);
      white-space: nowrap;
    }
    .btn-go {
      padding: 9px 14px;
      border: none;
      border-radius: 10px;
      background: var(--primary);
      color: white;
      font-size: 0.82rem;
      font-weight: 800;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.12s, transform 0.08s;
    }
    .btn-go:hover  { background: var(--primary-d); }
    .btn-go:active { transform: scale(0.95); }

    /* アクションボタン */
    .actions {
      display: flex;
      gap: 6px;
    }
    .btn-act {
      flex: 1;
      padding: 8px 4px;
      border-radius: 10px;
      font-size: 0.72rem;
      font-weight: 800;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 3px;
      transition: opacity 0.12s, transform 0.08s;
      border: 1.5px solid transparent;
    }
    .btn-act:active { transform: scale(0.95); }
    .a-pause   { background:#fff7ed; color:#c2410c; border-color:#fed7aa; }
    .a-resume  { background:#eff6ff; color:#1d4ed8; border-color:#bfdbfe; }
    .a-block   { background:#fef2f2; color:#dc2626; border-color:#fecaca; }
    .a-unblock { background:#f8fafc; color:#475569; border-color:#e2e8f0; }
    .a-reset   { background:#f8fafc; color:#64748b; border-color:#e2e8f0; }

    /* 空状態 */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 80px 20px;
    }
    .empty-state .icon { font-size: 3.5rem; margin-bottom: 14px; }
    .empty-state p { color: #94a3b8; font-size: 0.95rem; }

    /* QR モーダル */
    .modal-bg {
      display: none;
      position: fixed; inset: 0;
      background: rgba(15,23,42,0.75);
      justify-content: center;
      align-items: center;
      z-index: 100;
      backdrop-filter: blur(6px);
    }
    .modal-bg.show { display: flex; }
    .modal-box {
      background: white;
      padding: 32px 28px;
      border-radius: 24px;
      text-align: center;
      max-width: 320px;
      width: 90%;
      box-shadow: 0 30px 60px rgba(0,0,0,0.3);
    }
    .modal-box h2 { font-size: 1.1rem; font-weight: 800; color: #1e293b; margin-bottom: 4px; }
    .modal-box .sub { font-size: 0.78rem; color: #94a3b8; margin-bottom: 18px; }
    .modal-box img { width: 200px; height: 200px; border-radius: 12px; border: 2px solid #f1f5f9; }
    .modal-url {
      margin: 12px 0;
      padding: 8px 12px;
      background: #f8fafc;
      border-radius: 8px;
      font-size: 0.75rem;
      color: #64748b;
      word-break: break-all;
    }
    .modal-close {
      width: 100%;
      padding: 12px;
      background: #1e293b;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 4px;
    }
  </style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="header-icon">🏫</div>
    <div class="header-text">
      <h1>学童 PC 管理</h1>
      <p>ゲーム時間管理システム</p>
    </div>
  </div>
  <button class="qr-btn" onclick="openQR()">📱 QR コード</button>
</div>

<div class="grid" id="grid">
  <div class="empty-state">
    <div class="icon">🖥️</div>
    <p>接続中の PC を待っています…</p>
  </div>
</div>

<div class="modal-bg" id="qrModal" onclick="closeQR()">
  <div class="modal-box" onclick="event.stopPropagation()">
    <h2>📱 このページを共有</h2>
    <div class="sub">QR を読み取るとスマホで開けます</div>
    <img src="/qr" alt="QR">
    <div class="modal-url" id="qrUrl"></div>
    <button class="modal-close" onclick="closeQR()">閉じる</button>
  </div>
</div>

<script>
  const fmt = s => s <= 0 ? '00:00'
    : `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;

  async function refresh() {
    try {
      const pcs = await fetch('/api/status').then(r => r.json());
      render(pcs || []);
    } catch {}
  }

  function render(pcs) {
    const grid = document.getElementById('grid');
    if (!pcs.length) {
      grid.innerHTML = `<div class="empty-state"><div class="icon">🖥️</div><p>接続中の PC を待っています…</p></div>`;
      return;
    }
    pcs.sort((a, b) => a.name.localeCompare(b.name));
    grid.innerHTML = pcs.map(pc => {
      const online = pc.connected;

      // カード状態
      let cls = '';
      if (!online)           cls = 'offline';
      else if (pc.remaining > 0) cls = 'running';
      else if (pc.paused)    cls = 'paused';
      else if (pc.blocked)   cls = 'blocked';

      // タグ
      const tags = [
        pc.blocked ? `<span class="tag tag-blocked">🔒 ブロック</span>` : '',
        pc.paused  ? `<span class="tag tag-paused">⏸ 一時停止</span>`   : '',
      ].join('');

      // タイマー表示
      let timer = `<div class="idle-text">⏱ 待機中</div>`;
      if (pc.remaining > 0) {
        const col = pc.remaining <= 60 ? 'red' : 'green';
        timer = `<div class="timer-num ${col}">${fmt(pc.remaining)}</div>
                 <div class="timer-sub">残り時間</div>`;
      } else if (pc.paused && pc.pausedAt > 0) {
        timer = `<div class="paused-pill">⏸ 一時停止中 — 残り ${fmt(pc.pausedAt)}</div>`;
      }

      // コントロール（接続中のみ）
      const controls = online ? `
        <div class="presets">
          <button class="btn-pre" onclick="go('${pc.name}',10)">10分</button>
          <button class="btn-pre" onclick="go('${pc.name}',20)">20分</button>
          <button class="btn-pre" onclick="go('${pc.name}',30)">30分</button>
        </div>
        <div class="custom-row">
          <input type="number" id="t-${pc.name}" min="1" max="120" value="15">
          <span class="unit">分</span>
          <button class="btn-go" onclick="goCustom('${pc.name}')">▶ スタート</button>
        </div>` : '';

      // アクション
      const pause  = online && pc.remaining > 0
        ? `<button class="btn-act a-pause"  onclick="api('/api/timer/pause', '${pc.name}')">⏸ 一時停止</button>` : '';
      const resume = online && pc.paused
        ? `<button class="btn-act a-resume" onclick="api('/api/timer/resume','${pc.name}')">▶ 再開</button>` : '';
      const block  = online
        ? (pc.blocked
          ? `<button class="btn-act a-unblock" onclick="api('/api/block/stop',  '${pc.name}')">🔓 解除</button>`
          : `<button class="btn-act a-block"   onclick="api('/api/block/start', '${pc.name}')">🔒 ブロック</button>`)
        : '';
      const reset  = `<button class="btn-act a-reset" onclick="api('/api/timer/reset','${pc.name}')">🔄 リセット</button>`;

      return `
      <div class="card ${cls}">
        <div class="card-head">
          <div class="pc-info">
            <div class="dot ${online ? 'on' : 'off'}"></div>
            <span class="pc-name">🖥 ${pc.name}</span>
          </div>
          <div>${tags}</div>
        </div>
        <div class="timer-area">${timer}</div>
        ${controls}
        <div class="actions">${pause}${resume}${block}${reset}</div>
      </div>`;
    }).join('');
  }

  async function api(url, pc) {
    await fetch(url, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({pc})
    });
    refresh();
  }

  function go(pc, min) {
    fetch('/api/timer/start', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({pc, minutes: min})
    }).then(refresh);
  }

  function goCustom(pc) {
    const v = parseInt(document.getElementById(`t-${pc}`)?.value);
    if (v >= 1) go(pc, v);
  }

  function openQR() {
    document.getElementById('qrUrl').textContent = location.href;
    document.getElementById('qrModal').classList.add('show');
  }
  function closeQR() {
    document.getElementById('qrModal').classList.remove('show');
  }

  refresh();
  setInterval(refresh, 1000);
</script>
</body>
</html>
